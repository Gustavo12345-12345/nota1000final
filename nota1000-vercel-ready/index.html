<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota 1000 - Corretor de Redação IA</title>
    <link rel="stylesheet" href="style.css?v=11">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="imagens/nota1000logo.jpg" type="image/png">
</head>
<body class="home-background"> 
    <!-- O CLASSE "home-background" AGORA ESTÁ NA ÚNICA TAG BODY -->
    <div class="container">
        <!-- O CONTEÚDO PRINCIPAL (HEADER E MAIN) É ENVOLVIDO PELO CONTAINER -->
        <header>
        </header>

        <main>
            <section class="hero">
                <div class="hero-text">
                    <h1>Corrija e pratique redações do ENEM com eficiência</h1>
                    <p>Nossa inteligência artificial fornece uma correção precisa, baseada nas 5 competências do ENEM, para você alcançar a nota máxima.</p>
                    <div class="hero-buttons">
                        <!-- LOCAL DE ALTERAÇÃO: Adicionada a classe 'btn-practice-main' para mudar a cor para verde -->
                        <button class="btn btn-primary btn-practice-main" id="btnPraticarRedacao"><span class="material-icons">edit</span> Praticar Redação</button>
                        <button class="btn btn-secondary" id="btnCorrigirRedacao"><span class="material-icons">upload_file</span> Corrigir Redação Pronta</button>
                    </div>
                </div>
                <div class="hero-image">
                    <img src="imagens/imagemsite.png" alt="Ilustração de uma folha de redação com lápis">
                </div>
            </section>
        </main>
    </div>
    
    <!-- Scripts do Firebase COMPAT (Necessário para o formato atual do script.js) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>

    <script src="common.js"></script>
    <script src="script.js"></script>
</body>
</html>
<script>
(function(){
  // Tenta ligar o menu; retorna true se conseguiu
  function wireUpHamburger() {
    var btn = document.getElementById('hamburgerBtn');
    var nav = document.getElementById('siteNav');
    if (!btn || !nav) return false;

    // Evita ligar duas vezes
    if (btn.dataset.bound === '1') return true;
    btn.dataset.bound = '1';

    // Acessibilidade inicial
    btn.setAttribute('aria-controls', 'siteNav');
    btn.setAttribute('aria-expanded', 'false');

    // Click no botão: abre/fecha
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      var open = nav.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });

    // Click fora: fecha
    document.addEventListener('click', function (e) {
      if (!nav.classList.contains('open')) return;
      if (e.target.closest('#siteNav') || e.target.closest('#hamburgerBtn')) return;
      nav.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });

    // Navegar por um link do menu: fecha
    nav.addEventListener('click', function (e) {
      var a = e.target.closest('a');
      if (!a) return;
      nav.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });

    return true;
  }

  // 1) Tenta ligar quando o DOM estiver pronto
  if (document.readyState !== 'loading') {
    if (!wireUpHamburger()) retryWireUp();
  } else {
    document.addEventListener('DOMContentLoaded', function(){
      if (!wireUpHamburger()) retryWireUp();
    });
  }

  // 2) Se o header é injetado depois (via fetch), observamos mudanças no DOM
  function retryWireUp() {
    // Retry leve por 2s (a cada 200ms)
    var tries = 0, maxTries = 10;
    var iv = setInterval(function(){
      tries++;
      if (wireUpHamburger() || tries >= maxTries) clearInterval(iv);
    }, 200);
  }

  // 3) MutationObserver: se adicionarem #hamburgerBtn ou #siteNav depois, ligamos na hora
  var mo = new MutationObserver(function(){
    wireUpHamburger();
  });
  mo.observe(document.documentElement || document.body, { childList: true, subtree: true });
})();
</script>
