<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Nota 1000</title>
  <link rel="stylesheet" href="style.css?v=11">>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <div class="container">
   

    <main>
      <section class="contact-container">
        <h1>Fale Conosco</h1>
        <p class="subtitle">Tem alguma dúvida, sugestão ou parceria? Envie sua mensagem e entraremos em contato o quanto antes.</p>

        <form id="contactForm" class="contact-form">
          <div class="input-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
          </div>

          <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
          </div>

          <div class="input-group">
            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" name="mensagem" rows="6" placeholder="Escreva aqui sua mensagem..." required></textarea>
          </div>

          <button type="submit" class="btn btn-primary">
            <span class="material-icons">send</span> Enviar Mensagem
          </button>

          <div id="statusMessage" class="form-status"></div>
        </form>
      </section>
    </main>
  </div>

  <footer>
    © 2025 Nota 1000 — Todos os direitos reservados.
  </footer>

  <script src="common.js"></script>
  <script>
    const form = document.getElementById('contactForm');
    const status = document.getElementById('statusMessage');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      status.textContent = 'Enviando mensagem...';
      status.className = 'form-status sending';

      setTimeout(() => {
        status.textContent = 'Mensagem enviada com sucesso! Obrigado por entrar em contato.';
        status.className = 'form-status success';
        form.reset();
      }, 1500);
    });
    
  </script>
  <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
    <script src="common.js"></script>
</body>
</html>
    <script>
(function(){
  // Tenta ligar o menu; retorna true se conseguiu
  function wireUpHamburger() {
    var btn = document.getElementById('hamburgerBtn');
    var nav = document.getElementById('siteNav');
    if (!btn || !nav) return false;

    // Evita ligar duas vezes
    if (btn.dataset.bound === '1') return true;
    btn.dataset.bound = '1';

    // Acessibilidade inicial
    btn.setAttribute('aria-controls', 'siteNav');
    btn.setAttribute('aria-expanded', 'false');

    // Click no botão: abre/fecha
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      var open = nav.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });

    // Click fora: fecha
    document.addEventListener('click', function (e) {
      if (!nav.classList.contains('open')) return;
      if (e.target.closest('#siteNav') || e.target.closest('#hamburgerBtn')) return;
      nav.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });

    // Navegar por um link do menu: fecha
    nav.addEventListener('click', function (e) {
      var a = e.target.closest('a');
      if (!a) return;
      nav.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });

    return true;
  }

  // 1) Tenta ligar quando o DOM estiver pronto
  if (document.readyState !== 'loading') {
    if (!wireUpHamburger()) retryWireUp();
  } else {
    document.addEventListener('DOMContentLoaded', function(){
      if (!wireUpHamburger()) retryWireUp();
    });
  }

  // 2) Se o header é injetado depois (via fetch), observamos mudanças no DOM
  function retryWireUp() {
    // Retry leve por 2s (a cada 200ms)
    var tries = 0, maxTries = 10;
    var iv = setInterval(function(){
      tries++;
      if (wireUpHamburger() || tries >= maxTries) clearInterval(iv);
    }, 200);
  }

  // 3) MutationObserver: se adicionarem #hamburgerBtn ou #siteNav depois, ligamos na hora
  var mo = new MutationObserver(function(){
    wireUpHamburger();
  });
  mo.observe(document.documentElement || document.body, { childList: true, subtree: true });
})();
</script>
